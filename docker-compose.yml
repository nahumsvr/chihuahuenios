services:
  postgres:
    image: postgres:15-alpine
    container_name: chihuahuenos_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - chihuahuenos_network

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: chihuahuenos_s3
    restart: always
    ports:
      - "9000:9000" # API S3
      - "9001:9001" # Consola Web
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    networks:
      - chihuahuenos_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chihuahuenos_backend
    restart: always
    ports:
      - "${PORT}:${PORT}"
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NOMBRE: ${ADMIN_NOMBRE}
    depends_on:
      - postgres
      - minio
    networks:
      - chihuahuenos_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chihuahuenos_frontend
    restart: always
    ports:
      - "8000:3000" # Mapea el puerto 3000 interno de Next al 8000 del host para no chocar con NestJS
    environment:
      NODE_ENV: ${NODE_ENV}
      # URL utilizada por componentes ejecutados en el Navegador (Fuera de Docker)
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      # URL utilizada por Server Components para fetch interno directo (Dentro de Docker)
      API_INTERNAL_URL: ${API_INTERNAL_URL}
    depends_on:
      - backend
    networks:
      - chihuahuenos_network

volumes:
  pgdata:
    driver: local
  miniodata:
    driver: local

networks:
  chihuahuenos_network:
    driver: bridge
